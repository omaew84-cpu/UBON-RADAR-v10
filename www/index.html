<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>THAI-RADAR V11</title>
<style>
:root{--bg:#000814;--fg:#00bfff;--card:#001d3d}
body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui}
header{padding:12px;text-align:center;border-bottom:1px solid var(--fg);font-weight:700}
#radar{position:relative;height:48vh;display:flex;align-items:center;justify-content:center}
canvas{width:92vmin;height:92vmin}
#logo{position:absolute;width:18vmin;height:18vmin;border-radius:50%;border:3px solid var(--fg);background:#000}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px}
.card{background:var(--card);border:1px solid var(--fg);border-radius:10px;padding:8px}
#log{height:20vh;overflow:auto;background:#000;color:#0ff;font-family:monospace;font-size:12px;padding:5px;white-space:pre-wrap}
button{background:var(--fg);color:#000;border:0;padding:8px 12px;border-radius:6px;font-weight:700;margin:2px}
.danger{color:#ff0040;animation:blink .4s infinite}@keyframes blink{50%{opacity:.3}}
</style>
</head>
<body>
<header>THAI-RADAR V11 • เสียงเตือนไทย</header>
<div id="radar"><canvas id="c"></canvas><img id="logo" src="logo.png" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iIzAwMDgxNCIgc3Ryb2tlPSIjMDBiZmZmIiBzdHJva2Utd2lkdGg9IjQiLz48dGV4dCB4PSI1MCIgeT0iNTgiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiMwMGJmZmYiIGZvbnQtc2l6ZT0iMTgiPlRIQUk8L3RleHQ+PC9zdmc+'"></div>

<div class="grid">
 <div class="card">สถานะ<br><span id="st">ทำงาน</span></div>
 <div class="card">ภัย<br><span id="th">-</span></div>
 <div class="card">IP<br><span id="ip">-</span></div>
 <div class="card">ระดับ<br><span id="lv">-</span></div>
</div>
<div class="card" style="margin:8px">Log<div id="log"></div>
<button onclick="start()">เริ่ม</button><button onclick="stop()">หยุด</button><button onclick="save()">บันทึก</button></div>

<script>
const c=document.getElementById('c'),x=c.getContext('2d');let ang=0,run=1,tm;
function size(){c.width=c.height=Math.min(innerWidth,innerHeight*0.48)*0.92}size();onresize=size;
function draw(){x.clearRect(0,0,c.width,c.height);const cx=c.width/2,cy=c.height/2,r=cx*0.92;
 x.strokeStyle='#004a7c';x.lineWidth=1.5;for(let i=1;i<=4;i++){x.beginPath();x.arc(cx,cy,r*i/4,0,Math.PI*2);x.stroke()}
 for(let i=0;i<12;i++){x.beginPath();x.moveTo(cx,cy);x.lineTo(cx+r*Math.cos(i*Math.PI/6),cy+r*Math.sin(i*Math.PI/6));x.stroke()}
 // สแกนฟ้าสว่าง
 const g=x.createConicGradient(ang,cx,cy);g.addColorStop(0,'rgba(0,191,255,0.9)');g.addColorStop(0.15,'rgba(0,191,255,0.15)');g.addColorStop(0.3,'transparent');
 x.fillStyle=g;x.beginPath();x.moveTo(cx,cy);x.arc(cx,cy,r,ang-0.8,ang);x.fill();ang+=0.06;requestAnimationFrame(draw)}
draw();

function log(t){document.getElementById('log').textContent=`[${new Date().toLocaleTimeString()}] ${t}\n`+document.getElementById('log').textContent}
function speak(txt){if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(txt);u.lang='th-TH';u.rate=0.9;speechSynthesis.cancel();speechSynthesis.speak(u)}}

function scan(){const ip=[...Array(4)].map(()=>Math.floor(Math.random()*256)).join('.');const r=Math.random();let lv='ต่ำ',cls='';
 document.getElementById('ip').textContent=ip;
 if(r>0.85){lv='สูงมาก';cls='danger';document.getElementById('th').textContent='Port Scan';navigator.vibrate&&navigator.vibrate([300,100,300]);speak('ตรวจพบภัยคุกคามระดับสูง')}
 else if(r>0.6){lv='ปานกลาง';document.getElementById('th').textContent='สแกนผิดปกติ'}else{document.getElementById('th').textContent='ปกติ'}
 document.getElementById('lv').className=cls;document.getElementById('lv').textContent=lv;log(`IP ${ip} • ${lv}`)}
function start(){if(tm)return;tm=setInterval(scan,2000);log('เริ่ม V11')}function stop(){clearInterval(tm);tm=null;log('หยุด')}
function save(){const b=new Blob([document.getElementById('log').textContent],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='thai-radar-v11.txt';a.click()}
start();
</script>
</body>
</html>
