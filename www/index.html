<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>THAI-RADAR V12.2</title>
<style>body{margin:0;background:#000814;color:#e2f3ff;font-family:system-ui}header{text-align:center;padding:12px}h1{margin:0}h1 span{color:#00bfff}#r{width:90vmin;max-width:400px;aspect-ratio:1;margin:auto;position:relative;border-radius:50%;background:#001529;border:1px solid #005}.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:90vmin;max-width:400px;margin:10px auto}.card{background:#001d3a;padding:8px;border-radius:10px;border:1px solid #004}.lab{font-size:11px;color:#7cf}.val{font-weight:700;margin-top:3px}.mono{font-family:monospace}#logw{width:90vmin;max-width:400px;margin:auto;background:#000c1a;border:1px solid #003; border-radius:10px;min-height:160px;display:flex;flex-direction:column}#logh{padding:6px 10px;border-bottom:1px solid #003;display:flex;justify-content:space-between}#log{flex:1;overflow:auto;padding:6px;font-family:monospace;font-size:12px;color:#5ee}button{background:#0bf;border:0;padding:5px 10px;border-radius:6px;font-weight:700}</style></head><body>
<header><h1>THAI-<span>RADAR</span> V12.2</h1></header>
<div id="r"><canvas id="c" style="width:100%;height:100%"></canvas></div>
<div class="cards">
 <div class="card"><div class="lab">IP จริง</div><div id="ip" class="val mono">-</div></div>
 <div class="card"><div class="lab">เครือข่าย</div><div id="net" class="val">-</div></div>
 <div class="card"><div class="lab">ตำแหน่ง</div><div id="loc" class="val">-</div></div>
 <div class="card"><div class="lab">ความเสี่ยง</div><div id="risk" class="val">-</div></div>
</div>
<div id="logw"><div id="logh"><span>SYSTEM LOG</span><span><button onclick="check()">สแกน</button><button onclick="save()">บันทึก</button></span></div><div id="log"></div></div>
<script>
const ABUSE_KEY=''; const LINE_TOKEN='';
const ipEl=document.getElementById('ip'),netEl=document.getElementById('net'),locEl=document.getElementById('loc'),riskEl=document.getElementById('risk'),logEl=document.getElementById('log');
let logs=[]; function lg(m,c){logs.unshift(`[${new Date().toLocaleTimeString('th-TH')}] ${m}`);const d=document.createElement('div');d.textContent='> '+logs[0];d.style.color=c||'#5ee';logEl.prepend(d)}

// radar simple
const cv=document.getElementById('c'),x=cv.getContext('2d');function sz(){cv.width=cv.height=400}sz();let a=0;function dr(){x.clearRect(0,0,400,400);x.strokeStyle='#004';for(let i=1;i<5;i++){x.beginPath();x.arc(200,200,40*i,0,7);x.stroke()}x.fillStyle='#0bf';x.globalAlpha=.6;x.beginPath();x.moveTo(200,200);x.arc(200,200,180,a-.6,a);x.fill();x.globalAlpha=1;a+=.05;requestAnimationFrame(dr)}dr();

async function check(){
 lg('เริ่มสแกน...','#7cf');
 try{
  netEl.textContent=navigator.connection?navigator.connection.effectiveType:'wifi';
  // 1. IP - ใช้ https
  const ipd=await fetch('https://api.ipify.org?format=json').then(r=>r.json()); ipEl.textContent=ipd.ip; lg('ได้ IP: '+ipd.ip);
  // 2. Geo - ใช้ ipwho.is (https ฟรี)
  const geo=await fetch(`https://ipwho.is/${ipd.ip}`).then(r=>r.json()); locEl.textContent=`${geo.city}, ${geo.country}`; lg(`ตำแหน่ง: ${geo.city}`);
  // 3. Risk
  let risk='ต่ำ',col='#5ee';
  if(ABUSE_KEY){try{const ab=await fetch(`https://api.abuseipdb.com/api/v2/check?ipAddress=${ipd.ip}`,{headers:{Key:ABUSE_KEY}}).then(r=>r.json());const s=ab.data.abuseConfidenceScore;risk=s>75?'สูงมาก':s>30?'ปานกลาง':'ต่ำ';col=s>75?'#f55':s>30?'#fd6':'#5ee'}catch{}}
  riskEl.textContent=risk; riskEl.style.color=col; lg('ความเสี่ยง: '+risk,col);
  if(risk==='สูงมาก'){speechSynthesis.speak(new SpeechSynthesisUtterance('ตรวจพบภัยคุกคาม'));navigator.vibrate&&navigator.vibrate(200)}
 }catch(e){ lg('ERROR: '+e.message,'#f55'); console.error(e) }
}
function save(){const b=new Blob([logs.join('\n')],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='radar.txt';a.click()}

lg('ระบบพร้อม V12.2'); check(); setInterval(check,60000);
</script></body></html>
